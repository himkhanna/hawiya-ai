{{- /*
Inline secrets — used only when no `existingDatabaseSecret` / `existingAuthSecret`
is supplied. For production, create the secrets out-of-band (Sealed Secrets,
external-secrets, KMS-backed CSI driver) and reference them via the
`existing*Secret` values. Inline values in version control are a bad idea.
*/ -}}
{{- if not .Values.secrets.existingDatabaseSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-database" (include "hawiya.fullname" .) }}
  labels:
    {{- include "hawiya.labels" . | nindent 4 }}
type: Opaque
stringData:
  dsn: {{ .Values.secrets.databaseUrl | quote }}
  dsn-sync: {{ .Values.secrets.databaseUrlSync | quote }}
{{- end }}
{{- if not .Values.secrets.existingAuthSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-auth" (include "hawiya.fullname" .) }}
  labels:
    {{- include "hawiya.labels" . | nindent 4 }}
type: Opaque
stringData:
  bearer-token: {{ .Values.secrets.bearerToken | quote }}
{{- end }}
