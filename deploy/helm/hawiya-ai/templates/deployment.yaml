apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hawiya.fullname" . }}
  labels:
    {{- include "hawiya.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hawiya.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hawiya.selectorLabels" . | nindent 8 }}
      annotations:
        # Force a rollout when the secret content changes.
        checksum/secrets: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "hawiya.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: HAWIYA_ENV
              value: {{ .Values.app.env | quote }}
            - name: HAWIYA_LOG_LEVEL
              value: {{ .Values.app.logLevel | quote }}
            - name: HAWIYA_RATE_LIMIT_DEFAULT_PER_MINUTE
              value: {{ .Values.app.rateLimitDefaultPerMinute | quote }}
            - name: HAWIYA_OTEL_SERVICE_NAME
              value: {{ .Values.app.otel.serviceName | quote }}
            - name: HAWIYA_OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.app.otel.exporterEndpoint | quote }}
            - name: HAWIYA_OTEL_CONSOLE_EXPORTER
              value: {{ .Values.app.otel.consoleExporter | quote }}
            - name: HAWIYA_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "hawiya.databaseSecretName" . }}
                  key: dsn
            - name: HAWIYA_DATABASE_URL_SYNC
              valueFrom:
                secretKeyRef:
                  name: {{ include "hawiya.databaseSecretName" . }}
                  key: dsn-sync
            - name: HAWIYA_DEV_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "hawiya.authSecretName" . }}
                  key: bearer-token
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          {{- with .Values.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
