# Local development only. Production deployment is via Helm
# (see docs/deployment/kubernetes.md, week 4).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hawiya
      POSTGRES_PASSWORD: hawiya
      POSTGRES_DB: hawiya
    ports:
      - "5432:5432"
    volumes:
      - hawiya_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hawiya -d hawiya"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      HAWIYA_ENV: dev
      HAWIYA_LOG_LEVEL: INFO
      HAWIYA_DATABASE_URL: postgresql+psycopg://hawiya:hawiya@postgres:5432/hawiya
      HAWIYA_DATABASE_URL_SYNC: postgresql+psycopg://hawiya:hawiya@postgres:5432/hawiya
      HAWIYA_DEV_BEARER_TOKEN: dev
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn hawiya.main:app --host 0.0.0.0 --port 8000"

volumes:
  hawiya_pgdata:
